networks:
  loadbalancer-net:
    driver: bridge

volumes:
  idms_data:
  honeypot_data:
  mongo_data:

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  database:
    image: mongo:latest
    container_name: database
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Backend servers ────────────────────────────────────────────────────────
  server1:
    build: ./Server/Server1
    container_name: server1
    depends_on:
      database:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server2:
    build: ./Server/Server2
    container_name: server2
    depends_on:
      database:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server3:
    build: ./Server/Server3
    container_name: server3
    depends_on:
      database:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server4:
    build: ./Server/Server4
    container_name: server4
    depends_on:
      database:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Load balancer ──────────────────────────────────────────────────────────
  loadbalancer:
    build: ./Server/LoadBalancer
    container_name: loadbalancer
    ports:
      - "5000:5000"
    depends_on:
      server1:
        condition: service_healthy
      server2:
        condition: service_healthy
      server3:
        condition: service_healthy
      server4:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Honeypot ───────────────────────────────────────────────────────────────
  honeypot:
    build: ./IDMS/honeypot
    container_name: honeypot
    ports:
      - "5002:5002"
    volumes:
      - honeypot_data:/data
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── IDMS proxy ─────────────────────────────────────────────────────────────
  idms:
    build: ./IDMS/idms
    container_name: idms
    ports:
      - "5001:5001"
    environment:
      - LOAD_BALANCER_URL=http://loadbalancer:5000
      - HONEYPOT_URL=http://honeypot:5002
      - SQLITE_PATH=/data/idms.db
    volumes:
      - idms_data:/data
    depends_on:
      loadbalancer:
        condition: service_healthy
      honeypot:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "8080:8080"
    environment:
      - IDMS_URL=http://idms:5001
    depends_on:
      idms:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── Client (test runner) ───────────────────────────────────────────────────
  client:
    build: ./Client
    container_name: client
    depends_on:
      idms:
        condition: service_healthy
    networks:
      - loadbalancer-net
    restart: "no"
