networks:
  loadbalancer-net:
    driver: bridge

volumes:
  idms_data:
  honeypot_data:

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  database:
    image: mongo:latest
    container_name: database
    ports:
      - "27017:27017"
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── Backend servers ────────────────────────────────────────────────────────
  server1:
    build: ./Server/Server1
    container_name: server1
    depends_on:
      - database
    networks:
      - loadbalancer-net
    restart: unless-stopped

  server2:
    build: ./Server/Server2
    container_name: server2
    depends_on:
      - database
    networks:
      - loadbalancer-net
    restart: unless-stopped

  server3:
    build: ./Server/Server3
    container_name: server3
    depends_on:
      - database
    networks:
      - loadbalancer-net
    restart: unless-stopped

  server4:
    build: ./Server/Server4
    container_name: server4
    depends_on:
      - database
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── Load balancer ──────────────────────────────────────────────────────────
  loadbalancer:
    build: ./Server/LoadBalancer
    container_name: loadbalancer
    ports:
      - "5000:5000"
    depends_on:
      - server1
      - server2
      - server3
      - server4
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── Honeypot ───────────────────────────────────────────────────────────────
  honeypot:
    build: ./IDMS/honeypot
    container_name: honeypot
    ports:
      - "5002:5002"
    volumes:
      - honeypot_data:/data
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── IDMS proxy ─────────────────────────────────────────────────────────────
  idms:
    build: ./IDMS/idms
    container_name: idms
    ports:
      - "5001:5001"
    environment:
      - LOAD_BALANCER_URL=http://loadbalancer:5000
      - HONEYPOT_URL=http://honeypot:5002
      - SQLITE_PATH=/data/idms.db
    volumes:
      - idms_data:/data
    depends_on:
      - loadbalancer
      - honeypot
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "8080:8080"
    environment:
      - IDMS_URL=http://idms:5001
    depends_on:
      - idms
    networks:
      - loadbalancer-net
    restart: unless-stopped

  # ── Client (test runner) ───────────────────────────────────────────────────
  client:
    build: ./Client
    container_name: client
    depends_on:
      - idms
    networks:
      - loadbalancer-net
    restart: "no"
